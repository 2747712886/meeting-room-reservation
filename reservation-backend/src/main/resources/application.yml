server:
  port: 8080

spring:
  application:
    name: reservation-backend
  datasource:
    url: jdbc:mysql://localhost:3307/meeting_room_reservation?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: reservation
    password: reservation
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: 123456

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

springdoc:
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true

app:
  jwt:
    secret: meeting-room-reservation-local-jwt-secret-2026
    expiration-minutes: 120
