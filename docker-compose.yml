services:
  mysql:
    image: mysql:8.4
    container_name: reservation-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: meeting_room_reservation
      MYSQL_USER: reservation
      MYSQL_PASSWORD: reservation
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7.4
    container_name: reservation-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: reservation-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: reservation
      RABBITMQ_DEFAULT_PASS: reservation

volumes:
  mysql-data:
